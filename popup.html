<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Example</title>
</head>
<body>

    <h1>Welcome to the Webpage</h1>
    <p>This is a standard text block visible on the page.</p>

    <script>
        // Executes immediately when the browser parses this script tag
        window.onload = function() {
            alert("you are hacked");
        };
    </script>

</body>
</html>
